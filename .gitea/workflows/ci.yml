on: [push, pull_request]

jobs:
  lint:
    runs-on: [self-hosted, linux]
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip3 install --no-cache-dir --break-system-packages pyflakes
      - run: python3 -m pyflakes miner/miner.py miner/_llm.py miner/_forge.py server/server.py server/fts_index.py server/rebuild_fts.py

  test-fts:
    runs-on: [self-hosted, linux]
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tests/test_fts.py

  miner-dry-run:
    runs-on: [self-hosted, linux]
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip3 install --no-cache-dir --break-system-packages -r miner/requirements.txt
      - run: python3 miner/miner.py --dry-run --limit 1
        env:
          FLEET_MEMORY_URL: "http://127.0.0.1:8800/mcp"
          LLM_BASE_URL: "https://api.openai.com/v1"
          LLM_API_KEY: "sk-dummy"
          LLM_MODEL: "gpt-4o-mini"
