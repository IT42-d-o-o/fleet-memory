services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  memory-mcp:
    build: ./server
    ports:
      - "8800:8800"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEM0_HISTORY_DB=/data/history.db
    volumes:
      - mcp_data:/data
    depends_on:
      - qdrant
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
  mcp_data:
